<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - FitMind</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: url('{{ url_for('static', filename='images/2.jpg') }}') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
        }

        header {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: #00ffae;
        }

        nav a {
            color: #fff;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: #00ffae;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1s ease;
        }

        .login-card h2 {
            text-align: center;
            color: #00ffae;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        input::placeholder {
            color: #ccc;
        }

        input[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #00ffae;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #00e69c;
        }

        .login-card p {
            text-align: center;
            margin-top: 15px;
            font-size: 0.95rem;
        }

        .login-card a {
            color: #00ffae;
            text-decoration: none;
            font-weight: 500;
        }

        .login-card a:hover {
            text-decoration: underline;
        }

        footer {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: #bbb;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 500px) {
            header h1 {
                font-size: 1.5rem;
            }

            nav a {
                font-size: 0.9rem;
            }

            .login-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>FitMind</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/register">Register</a>
        </nav>
    </header>

    <main>
        <div class="login-card">
            <h2>Login</h2>
            <form method="POST">
                <label>Username:</label>
                <input type="text" name="username" required placeholder="Enter your username">

                <label>Password:</label>
                <input type="password" name="password" required placeholder="Enter your password">

                <input type="submit" value="Login">
            </form>
            <p>{{ msg }}</p>
            <p>Don't have an account? <a href="/register">Register</a></p>
        </div>
    </main>

    <footer>
         FitMind | Empowering Body & Mind
    </footer>

</body>
</html>
