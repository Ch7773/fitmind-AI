<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - FitMind</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: url('{{ url_for('static', filename='images/2.jpg') }}') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
        }

        header {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: #00ffae;
        }

        nav a {
            color: #fff;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: #00ffae;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1s ease;
        }

        .register-card h2 {
            text-align: center;
            color: #00ffae;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin: 10px 0 6px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            margin-bottom: 15px;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='white' viewBox='0 0 140 140' xmlns='http://www.w3.org/2000/svg'><polygon points='0,0 140,0 70,140'/></svg>");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 12px;
        }

        select option {
            color: #000;
            background: #fff;
        }

        input[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #00ffae;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #00e69c;
        }

        .register-card p {
            text-align: center;
            margin-top: 15px;
            font-size: 0.95rem;
        }

        .register-card a {
            color: #00ffae;
            text-decoration: none;
            font-weight: 500;
        }

        .register-card a:hover {
            text-decoration: underline;
        }

        footer {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: #bbb;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 500px) {
            header h1 {
                font-size: 1.5rem;
            }

            nav a {
                font-size: 0.9rem;
            }

            .register-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>FitMind</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/login">Login</a>
        </nav>
    </header>

    <main>
        <div class="register-card">
            <h2>Register</h2>
            <form method="POST">
                <label>Full Name:</label>
                <input type="text" name="fullname" required placeholder="Enter your full name">

                <label>Email:</label>
                <input type="email" name="email" required placeholder="Enter your email">

                <label>Username:</label>
                <input type="text" name="username" required placeholder="Choose a username">

                <label>Password:</label>
                <input type="password" name="password" required placeholder="Create a password">

                <label>Age:</label>
                <input type="number" name="age" min="1" required placeholder="Your age">

                <label>Gender:</label>
                <select name="gender" required>
                    <option value="">Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>

                <input type="submit" value="Register">
            </form>
            <p>{{ msg }}</p>
            <p>Already have an account? <a href="/login">Login</a></p>
        </div>
    </main>

    <footer>
         FitMind | Join the Mind-Body Revolution
    </footer>

</body>
</html>
