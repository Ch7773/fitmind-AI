
<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot Support</title>
</head>
<body>
    <h2>Welcome to the AI Chatbot</h2>
    <form method="POST" action="/get">
        <label>Enter your message:</label><br>
        <input type="text" name="msg" required style="width: 300px;"><br><br>
        <input type="submit" value="Send">
    </form>

    {% if user_msg %}
    <p><strong>You:</strong> {{ user_msg }}</p>
    <p><strong>Bot:</strong> {{ bot_response }}</p>
    {% endif %}
</body>
</html>
