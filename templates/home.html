<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FitMind - Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Custom Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* Base Reset & Fonts */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: url('{{ url_for('static', filename='images/2.jpg') }}') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #fff;
        }

        header {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: #00ffae;
            letter-spacing: 1px;
        }

        nav a {
            color: #fff;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: #00ffae;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            flex: 1;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 20px;
            max-width: 800px;
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            animation: slideUp 1s ease;
        }

        .card h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .card p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .feature-box {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }

        .feature-box:hover {
            transform: scale(1.05);
        }

        .feature-box span {
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
        }

        footer {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: #bbb;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.5rem;
            }

            .card {
                padding: 25px;
            }

            .card h2 {
                font-size: 1.6rem;
            }

            .card p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>FitMind</h1>
        <nav>
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        </nav>
    </header>

    <main>
        <div class="card">
            <h2>Welcome to FitMind</h2>
            <p>Your integrated platform for fitness planning and mental health monitoring</p>

            <div class="features">
                <div class="feature-box">
                    <span>🏋️</span>
                    Personalized Fitness & Diet Plans
                </div>
                <div class="feature-box">
                    <span>🧠</span>
                    Mental Health Mood Tracking
                </div>
                <div class="feature-box">
                    <span>🧘</span>
                    Guided Meditation and Stress Relief
                </div>
                <div class="feature-box">
                    <span>🤖</span>
                    AI Chatbot Support
                </div>
            </div>
        </div>
    </main>

    <footer>
         FitMind | Stronger Body, Healthier Mind
    </footer>
</body>
</html>
